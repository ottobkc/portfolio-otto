# -----------------------------------------------
# NETLIFY CONFIGURATION — ottokols.es
# -----------------------------------------------
[build]
  publish = "PortfolioOtto"

# -----------------------------------------------
# HEADERS /members/ — sin indexar
# -----------------------------------------------
[[headers]]
  for = "/members/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# -----------------------------------------------
# REDIRECTS — mirardespacio.es -> salidas.html
# -----------------------------------------------
[[redirects]]
  from   = "https://mirardespacio.es/*"
  to     = "https://ottokols.es/salidas.html?utm_source=mirardespacio&utm_medium=redirect&utm_campaign=dominio_directo"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.mirardespacio.es/*"
  to     = "https://ottokols.es/salidas.html?utm_source=mirardespacio&utm_medium=redirect&utm_campaign=dominio_directo"
  status = 301
  force  = true

# -----------------------------------------------
# REDIRECTS GENERALES
# -----------------------------------------------
[[redirects]]
  from   = "https://www.ottokols.es/*"
  to     = "https://ottokols.es/:splat"
  status = 301
  force  = true
