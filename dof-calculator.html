    const { useState, useMemo } = React;



// ─── Sensor sizes (crop factor relative to full frame 36×24mm) ───────────────
const CAMERAS = [
  { id: "ff",   label: "Full Frame (35mm)", cropFactor: 1.0,  sensorW: 36,   sensorH: 24   },
  { id: "apsc", label: "APS-C (Sony/Nikon)", cropFactor: 1.5,  sensorW: 23.5, sensorH: 15.6 },
  { id: "apsc_canon", label: "APS-C (Canon)", cropFactor: 1.6, sensorW: 22.3, sensorH: 14.9 },
  { id: "mft",  label: "Micro 4/3",          cropFactor: 2.0,  sensorW: 17.3, sensorH: 13   },
  { id: "phone",label: "Smartphone (1/1.7\")", cropFactor: 4.5, sensorW: 7.6,  sensorH: 5.7  },
];

const FOCAL_LENGTHS = [14, 18, 24, 28, 35, 50, 70, 85, 100, 135, 200];
const APERTURES     = [1.4, 1.8, 2.0, 2.8, 4.0, 5.6, 8.0, 11, 16, 22];

// Circle of confusion (mm) = sensor diagonal / 1500  (standard approximation)
function calcCoC(camera) {
  const diag = Math.sqrt(camera.sensorW ** 2 + camera.sensorH ** 2);
  return diag / 1500;
}

// DoF formulas (all distances in meters)
function calcDoF(focalMm, aperture, distanceM, cameraId) {
  const camera = CAMERAS.find(c => c.id === cameraId);
  const f  = focalMm / 1000;           // focal length in metres
  const c  = calcCoC(camera) / 1000;   // CoC in metres
  const s  = distanceM;
  const N  = aperture;

  // Hyperfocal distance
  const H = (f * f) / (N * c) + f;

  // Near / far limits
  const near = (s * (H - f)) / (H + s - 2 * f);
  const far  = s >= H ? Infinity : (s * (H - f)) / (H - s);

  const dofTotal = far === Infinity ? Infinity : far - near;

  return { near, far, H, dofTotal };
}

// ─── Scale helpers ────────────────────────────────────────────────────────────
const MAX_DIST_M = 20; // scene width in metres

function mToPercent(m) {
  return Math.min((m / MAX_DIST_M) * 100, 100);
}

  },

  dataRow: {

  },

  },

  },

// SVG silhouettes
function Photographer({ size = 52 }) {
  return (
    <svg width={size * 0.65} height={size} viewBox="0 0 40 64" fill="none">
      {/* head */}
      <circle cx="20" cy="9" r="7" fill={C.text} />
      {/* camera */}
      <rect x="4" y="22" width="14" height="9" rx="2" fill={C.text} />
      <rect x="6" y="19" width="4" height="4" rx="1" fill={C.text} />
      {/* body */}
      <path d="M14 31 L10 52 L16 52 L20 38 L24 52 L30 52 L26 31 Z" fill={C.text} />
      {/* arms */}
      <path d="M14 31 L4 32 L4 40" stroke={C.text} strokeWidth="3.5" strokeLinecap="round" />
      <path d="M26 31 L34 28" stroke={C.text} strokeWidth="3.5" strokeLinecap="round" />
      {/* legs */}
      <path d="M10 52 L8 64" stroke={C.text} strokeWidth="3.5" strokeLinecap="round" />
      <path d="M30 52 L32 64" stroke={C.text} strokeWidth="3.5" strokeLinecap="round" />
    </svg>
  );
}

function Subject({ size = 52 }) {
  return (
    <svg width={size * 0.55} height={size} viewBox="0 0 34 64" fill="none">
      {/* head */}
      <circle cx="17" cy="9" r="7" fill={C.muted} opacity="0.7" />
      {/* body */}
      <path d="M10 16 L8 48 L14 48 L17 32 L20 48 L26 48 L24 16 Z" fill={C.muted} opacity="0.7" />
      {/* legs */}
      <path d="M8 48 L6 64" stroke={C.muted} strokeWidth="3.5" strokeLinecap="round" opacity="0.7" />
      <path d="M26 48 L28 64" stroke={C.muted} strokeWidth="3.5" strokeLinecap="round" opacity="0.7" />
    </svg>
  );
}

// Format distance nicely
function fmtDist(m) {
  if (m === Infinity || m > 999) return "∞";
  if (m < 0) return "0.00 m";
  return m.toFixed(2) + " m";
}

function DoFCalculator() {
  const [cameraId,    setCamera]    = useState("apsc");
  const [focalIdx,    setFocalIdx]  = useState(6);   // 70mm default
  const [apertureIdx, setApertureIdx] = useState(3); // f/2.8
  const [distanceM,   setDistanceM] = useState(3);   // 3 m

  const focal    = FOCAL_LENGTHS[focalIdx];
  const aperture = APERTURES[apertureIdx];

  const { near, far, H, dofTotal } = useMemo(
    () => calcDoF(focal, aperture, distanceM, cameraId),
    [focal, aperture, distanceM, cameraId]
  );

  // Scene positions as percentages of MAX_DIST_M
  // Photographer is at 0m (left edge), subject at distanceM
  const focusPct = mToPercent(distanceM);
  const nearPct  = mToPercent(Math.max(near, 0));
  const farPct   = far === Infinity ? 100 : mToPercent(far);
  const hyperPct = H < MAX_DIST_M ? mToPercent(H) : null;

  // Subject figure: offset so figure is centred on its distance
  const subjectLeft = `calc(${focusPct}% - 12px)`;

  return (
    <div style={styles.root}>
      {/* Header */}
      <div style={styles.header}>
        <p style={styles.eyebrow}>Mirar Despacio +</p>
        <h1 style={styles.title}>Profundidad de Campo</h1>
        <p style={styles.subtitle}>Ajusta los parámetros y observa cómo cambia la zona enfocada</p>
      </div>

      {/* Controls */}
      <div style={styles.card}>
        <p style={styles.sectionLabel}>Parámetros</p>
        <div style={styles.controlGrid}>

          {/* Camera */}
          <div style={styles.controlGroup}>
            <span style={styles.label}>Cámara / sensor</span>
            <select
              style={styles.select}
              value={cameraId}
              onChange={e => setCamera(e.target.value)}
            >
              {CAMERAS.map(c => (
                <option key={c.id} value={c.id}>{c.label}</option>
              ))}
            </select>
          </div>

          {/* Distance */}
          <div style={styles.controlGroup}>
            <span style={styles.label}>Distancia de enfoque</span>
            <div style={styles.rangeWrap}>
              <span style={styles.rangeVal}>{distanceM.toFixed(1)}<span style={styles.rangeUnit}>m</span></span>
              <input
                type="range" min={0.5} max={MAX_DIST_M} step={0.1}
                value={distanceM}
                style={styles.range}
                onChange={e => setDistanceM(parseFloat(e.target.value))}
              />
            </div>
          </div>

          {/* Focal length */}
          <div style={styles.controlGroup}>
            <span style={styles.label}>Distancia focal</span>
            <div style={styles.rangeWrap}>
              <span style={styles.rangeVal}>{focal}<span style={styles.rangeUnit}>mm</span></span>
              <input
                type="range" min={0} max={FOCAL_LENGTHS.length - 1} step={1}
                value={focalIdx}
                style={styles.range}
                onChange={e => setFocalIdx(parseInt(e.target.value))}
              />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: C.muted }}>
                <span>{FOCAL_LENGTHS[0]}</span>
                <span>{FOCAL_LENGTHS[FOCAL_LENGTHS.length - 1]}</span>
              </div>
            </div>
          </div>

          {/* Aperture */}
          <div style={styles.controlGroup}>
            <span style={styles.label}>Apertura</span>
            <div style={styles.rangeWrap}>
              <span style={styles.rangeVal}>f/<span>{aperture}</span></span>
              <input
                type="range" min={0} max={APERTURES.length - 1} step={1}
                value={apertureIdx}
                style={styles.range}
                onChange={e => setApertureIdx(parseInt(e.target.value))}
              />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: C.muted }}>
                <span>f/{APERTURES[0]}</span>
                <span>f/{APERTURES[APERTURES.length - 1]}</span>
              </div>
            </div>
          </div>

        </div>
      </div>

      {/* Scene visualizer */}
      <div style={styles.card}>
        <p style={styles.sectionLabel}>Escena</p>

        <div style={styles.scene}>
          {/* Ground */}
          <div style={styles.ground} />

          {/* Scale ticks */}
          {[0,2,4,6,8,10,15,20].map(m => (
            <div key={m} style={{ ...styles.scaleTick, left: `${mToPercent(m)}%` }}>
              <div style={{ ...styles.scaleTickLine, height: m % 5 === 0 ? 18 : 10 }} />
              <span style={styles.scaleTickLabel}>{m}m</span>
            </div>
          ))}

          {/* DoF band */}
          {near >= 0 && (
            <div style={{
              ...styles.dofBand,
              left:  `${nearPct}%`,
              width: `${Math.max(farPct - nearPct, 0.5)}%`,
            }} />
          )}

          {/* Hyperfocal marker */}
          {hyperPct !== null && (
            <div style={{ ...styles.hyperLine, left: `${hyperPct}%` }} />
          )}

          {/* Focus line */}
          <div style={{ ...styles.focusLine, left: `calc(${focusPct}% - 1px)` }}>
            <div style={styles.focusDot} />
          </div>

          {/* Photographer (always at 0) */}
          <div style={styles.photographerFig}>
            <Photographer size={60} />
            <span style={styles.figLabel}>fotógrafo</span>
          </div>

          {/* Subject */}
          <div style={{ ...styles.subjectFig, left: subjectLeft }}>
            <Subject size={50} />
          </div>
        </div>

        {/* Legend */}
        <div style={styles.legend}>
          <div style={styles.legendItem}>
            <div style={{ ...styles.legendDot, background: C.gold }} />
            <span>Punto de enfoque ({distanceM.toFixed(1)} m)</span>
          </div>
          <div style={styles.legendItem}>
            <div style={{ ...styles.legendDot, background: C.dofBorder, opacity: 0.8 }} />
            <span>Zona enfocada</span>
          </div>
          {hyperPct !== null && (
            <div style={styles.legendItem}>
              <div style={{ ...styles.legendDot, background: "#b05a3a", borderTop: "2px dashed #b05a3a", height: 0, marginTop: 3 }} />
              <span>Hiperfocal ({H.toFixed(1)} m)</span>
            </div>
          )}
        </div>

        {/* Data boxes */}
        <div style={styles.dataRow}>
          <div style={styles.dataBox}>
            <p style={styles.dataKey}>Límite cercano</p>
            <p style={styles.dataVal}>{fmtDist(near)}</p>
            <p style={styles.dataSub}>desde el sensor</p>
          </div>
          <div style={styles.dataBox}>
            <p style={styles.dataKey}>Límite lejano</p>
            <p style={styles.dataVal}>{fmtDist(far)}</p>
            <p style={styles.dataSub}>hasta el sensor</p>
          </div>
          <div style={{ ...styles.dataBox, ...styles.dataBoxHyper }}>
            <p style={{ ...styles.dataKey, color: "#b05a3a" }}>Hiperfocal</p>
            <p style={styles.dataVal}>{fmtDist(H)}</p>
            <p style={styles.dataSub}>todo nítido desde {fmtDist(H / 2)}</p>
          </div>
        </div>

        {/* DoF total */}
        <div style={{ marginTop: 12, padding: "10px 14px", background: C.bg, borderRadius: 8, display: "flex", gap: 24, alignItems: "center" }}>
          <div>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em" }}>Profundidad total</span>
            <span style={{ fontSize: 22, fontWeight: 400, color: C.text, marginLeft: 10 }}>
              {dofTotal === Infinity ? "∞" : dofTotal.toFixed(2) + " m"}
            </span>
          </div>
          <div style={{ fontSize: 12, color: C.muted, flex: 1 }}>
            {dofTotal < 0.3
              ? "Profundidad muy reducida — bokeh pronunciado, ideal para retratos."
              : dofTotal < 1.5
              ? "Profundidad moderada — buena separación del fondo."
              : dofTotal < 5
              ? "Profundidad amplia — varios planos en foco."
              : "Profundidad muy amplia — prácticamente todo nítido."}
          </div>
        </div>
      </div>

      {/* Explanation */}
      <div style={{ ...styles.card, paddingTop: 20 }}>
        <p style={styles.sectionLabel}>¿Qué significa esto?</p>
        <p style={styles.explain}>
          La <strong>profundidad de campo</strong> es la franja de distancia que aparece
          nítida en tu foto. Cuanto mayor la apertura (número f más pequeño), más reducida
          la franja. Un objetivo más largo también la reduce. El sensor más grande la
          comprime: con Full Frame necesitas cerrar más el diafragma que con APS-C para
          conseguir el mismo efecto.
          <br /><br />
          La <strong>distancia hiperfocal</strong> es el truco del paisajista: si enfocas
          exactamente ahí, todo desde la mitad de esa distancia hasta el infinito quedará
          dentro de la zona nítida.
        </p>
      </div>

      <p style={{ textAlign: "center", fontSize: 11, color: C.goldDim, letterSpacing: "0.12em", marginTop: 8 }}>
        MIRAR DESPACIO +
      </p>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('react-mount'));
    root.render(React.createElement(DoFCalculator));
  </script>
</body>
</html>
